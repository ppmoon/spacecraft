[[permission]]
identifier = "allow-open-blank-window"
description = "Allow the UI to open a blank OS window via the Host"
commands.allow = ["open_blank_window"]

[[permission]]
identifier = "allow-close-launcher"
description = "Allow the UI to close the launcher"
commands.allow = ["close_launcher"]

[[permission]]
identifier = "allow-close-command-palette"
description = "Allow the UI to close the command palette"
commands.allow = ["close_command_palette"]

[[permission]]
identifier = "allow-list-plugins"
description = "Allow the launcher to list discovered Plugins"
commands.allow = ["list_plugins"]

[[permission]]
identifier = "allow-open-plugin"
description = "Allow the launcher to open a discovered Plugin window"
commands.allow = ["open_plugin"]

[[permission]]
identifier = "allow-propose-install"
description = "Allow proposing a local Plugin install"
commands.allow = ["propose_install"]

[[permission]]
identifier = "allow-confirm-install"
description = "Allow confirming a pending Plugin install"
commands.allow = ["confirm_install"]

[[permission]]
identifier = "allow-decline-install"
description = "Allow declining a pending Plugin install"
commands.allow = ["decline_install"]

[[permission]]
identifier = "allow-pending-install"
description = "Allow reading the pending Plugin install proposal"
commands.allow = ["pending_install"]

[[permission]]
identifier = "allow-bus-emit"
description = "Allow a Plugin window to emit on the scoped Bus proxy"
commands.allow = ["bus_emit"]

[[permission]]
identifier = "allow-bus-call"
description = "Allow a Plugin window to call on the scoped Bus proxy"
commands.allow = ["bus_call"]

[[permission]]
identifier = "allow-bus-subscribe"
description = "Allow a Plugin window to subscribe via the scoped Bus proxy"
commands.allow = ["bus_subscribe"]
