<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hello</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7faf9;
        --ink: #12323a;
        --accent: #1f7a6c;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at 20% 0%, #d9efe9, var(--bg) 55%);
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      main {
        min-height: 100%;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.75rem;
        font-weight: 600;
      }
      p {
        margin: 0;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Hello</h1>
        <p>Pure-UI Plugin fixture — no Sidecar, local UI only.</p>
      </div>
    </main>
  </body>
</html>
