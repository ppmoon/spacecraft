<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Command palette</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0f1720;
        --ink: #f3f7f8;
        --muted: #9db0b5;
        --accent: #e9c46a;
        --row: #1a2530;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: rgba(8, 12, 16, 0.72);
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      .shell {
        max-width: 36rem;
        margin: 12vh auto 0;
        background: var(--bg);
        border: 1px solid #2a3844;
        border-radius: 0.75rem;
        overflow: hidden;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 0;
        outline: 0;
        padding: 1rem 1.1rem;
        font: inherit;
        font-size: 1.05rem;
        background: transparent;
        color: var(--ink);
      }
      #commands {
        max-height: 16rem;
        overflow: auto;
      }
      button.command {
        display: block;
        width: 100%;
        text-align: left;
        border: 0;
        background: var(--row);
        color: var(--ink);
        font: inherit;
        padding: 0.85rem 1.1rem;
        cursor: pointer;
      }
      button.command:hover,
      button.command:focus,
      button.command.active {
        background: #243140;
        outline: none;
      }
      .hint {
        padding: 0.65rem 1.1rem 1rem;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .accent {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <input id="query" type="search" placeholder="Type a command…" autofocus />
      <div id="commands"></div>
      <div class="hint">
        <span class="accent">Ctrl/Cmd+K</span> opens this palette
      </div>
    </div>
    <script>
      async function invoke(cmd, args) {
        const fn = window.__TAURI__?.core?.invoke;
        if (fn) return await fn(cmd, args);
        return null;
      }

      let commands = [];
      let active = 0;

      async function closePalette() {
        await invoke("close_command_palette");
      }

      async function buildCommands() {
        const groups = (await invoke("list_window_groups")) || [];
        const items = [
          {
            label: "Open blank window",
            run: async () => {
              await invoke("open_blank_window");
            },
          },
        ];
        for (const group of groups) {
          items.push({
            label: `Open group: ${group.name}`,
            run: async () => {
              await invoke("open_window_group", { groupId: group.id });
            },
          });
          items.push({
            label: `Close group: ${group.name}`,
            run: async () => {
              await invoke("close_window_group", { groupId: group.id });
            },
          });
        }
        return items;
      }

      function visibleCommands() {
        const q = document.getElementById("query").value.trim().toLowerCase();
        if (!q) return commands;
        return commands.filter((c) => c.label.toLowerCase().includes(q));
      }

      function render() {
        const list = document.getElementById("commands");
        list.innerHTML = "";
        const visible = visibleCommands();
        if (active >= visible.length) active = Math.max(0, visible.length - 1);
        visible.forEach((cmd, index) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "command" + (index === active ? " active" : "");
          btn.textContent = cmd.label;
          btn.addEventListener("click", () => runCommand(cmd));
          list.append(btn);
        });
      }

      async function runCommand(cmd) {
        await cmd.run();
        await closePalette();
      }

      document.getElementById("query").addEventListener("input", () => {
        active = 0;
        render();
      });
      document.getElementById("query").addEventListener("keydown", (event) => {
        const visible = visibleCommands();
        if (event.key === "ArrowDown") {
          event.preventDefault();
          active = Math.min(active + 1, Math.max(0, visible.length - 1));
          render();
        } else if (event.key === "ArrowUp") {
          event.preventDefault();
          active = Math.max(active - 1, 0);
          render();
        } else if (event.key === "Enter") {
          if (visible[active]) runCommand(visible[active]);
        } else if (event.key === "Escape") {
          closePalette();
        }
      });

      buildCommands().then((items) => {
        commands = items;
        render();
      });
    </script>
  </body>
</html>
