<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Launcher</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #101820;
        --panel: #1b2a32;
        --ink: #e8f1f2;
        --accent: #2a9d8f;
        --muted: #8aa0a8;
        --warn: #e9c46a;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: linear-gradient(160deg, #0b1419, var(--bg));
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      main {
        padding: 1.25rem 1.5rem 1.5rem;
        overflow: auto;
        height: 100%;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 1rem;
        opacity: 0.8;
      }
      h2 {
        margin: 1.25rem 0 0.5rem;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      button {
        appearance: none;
        border: 0;
        background: var(--accent);
        color: #04221f;
        font: inherit;
        font-weight: 600;
        padding: 0.55rem 0.9rem;
        border-radius: 0.4rem;
        cursor: pointer;
      }
      button.secondary {
        background: var(--panel);
        color: var(--ink);
      }
      button.danger {
        background: #5c2b2b;
        color: #ffd9d9;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #2f414a;
        background: #0d151a;
        color: var(--ink);
        font: inherit;
        padding: 0.55rem 0.7rem;
        border-radius: 0.4rem;
        margin-bottom: 0.5rem;
      }
      #plugins {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.4rem;
      }
      #plugins li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        background: var(--panel);
        padding: 0.55rem 0.7rem;
        border-radius: 0.4rem;
      }
      #plugins .meta {
        min-width: 0;
      }
      #plugins .name {
        font-weight: 600;
      }
      #plugins .id {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
      }
      #empty {
        color: var(--muted);
        font-size: 0.9rem;
      }
      #proposal {
        background: var(--panel);
        border-radius: 0.5rem;
        padding: 0.85rem 0.9rem;
        margin-top: 0.5rem;
      }
      #proposal[hidden] {
        display: none;
      }
      #proposal h3 {
        margin: 0 0 0.35rem;
        font-size: 1rem;
      }
      #proposal .sig {
        color: var(--warn);
        font-size: 0.8rem;
        margin-bottom: 0.6rem;
      }
      #permissions {
        list-style: none;
        margin: 0 0 0.75rem;
        padding: 0;
        display: grid;
        gap: 0.3rem;
      }
      #permissions li {
        font-size: 0.85rem;
        background: #101920;
        padding: 0.4rem 0.55rem;
        border-radius: 0.3rem;
      }
      #permissions .kind {
        color: var(--warn);
        font-weight: 600;
        margin-right: 0.4rem;
      }
      #status {
        min-height: 1.2rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Spacecraft</h1>
      <p>Light launcher — install and open Plugins.</p>
      <div class="actions">
        <button id="open-blank" type="button">Open blank window</button>
        <button id="close" class="secondary" type="button">Close</button>
      </div>

      <h2>Install Plugin</h2>
      <input
        id="install-path"
        type="text"
        placeholder="Local folder or .zip path"
        spellcheck="false"
      />
      <div class="actions">
        <button id="propose" type="button">Review permissions</button>
      </div>
      <div id="proposal" hidden>
        <h3 id="proposal-title"></h3>
        <div class="sig" id="proposal-sig" hidden>Signature field present (not verified)</div>
        <ul id="permissions"></ul>
        <div class="actions">
          <button id="confirm" type="button">Confirm install</button>
          <button id="decline" class="danger" type="button">Decline</button>
        </div>
      </div>
      <p id="status"></p>

      <h2>Plugins</h2>
      <ul id="plugins"></ul>
      <p id="empty" hidden>No Plugins found in the plugins directory.</p>
    </main>
    <script>
      let currentProposal = null;

      async function invoke(cmd, args) {
        const fn = window.__TAURI__?.core?.invoke;
        if (!fn) return null;
        return await fn(cmd, args);
      }

      function setStatus(text) {
        document.getElementById("status").textContent = text || "";
      }

      function renderPlugins(plugins) {
        const list = document.getElementById("plugins");
        const empty = document.getElementById("empty");
        list.innerHTML = "";
        if (!plugins || plugins.length === 0) {
          empty.hidden = false;
          return;
        }
        empty.hidden = true;
        for (const plugin of plugins) {
          const li = document.createElement("li");
          const meta = document.createElement("div");
          meta.className = "meta";
          const name = document.createElement("div");
          name.className = "name";
          name.textContent = plugin.name;
          const id = document.createElement("span");
          id.className = "id";
          id.textContent = `${plugin.id} · v${plugin.version}`;
          meta.append(name, id);
          const open = document.createElement("button");
          open.type = "button";
          open.textContent = "Open";
          open.addEventListener("click", () => {
            invoke("open_plugin", { id: plugin.id });
          });
          li.append(meta, open);
          list.append(li);
        }
      }

      function renderProposal(proposal) {
        currentProposal = proposal;
        const box = document.getElementById("proposal");
        if (!proposal) {
          box.hidden = true;
          return;
        }
        box.hidden = false;
        document.getElementById("proposal-title").textContent =
          `${proposal.name} (${proposal.pluginId} v${proposal.version})`;
        const sig = document.getElementById("proposal-sig");
        sig.hidden = !proposal.signaturePresent;
        const list = document.getElementById("permissions");
        list.innerHTML = "";
        for (const item of proposal.permissions || []) {
          const li = document.createElement("li");
          const kind = document.createElement("span");
          kind.className = "kind";
          kind.textContent = item.kind;
          const detail = item.sensitive
            ? `${item.detail} (sensitive)`
            : item.detail;
          li.append(kind, document.createTextNode(detail));
          list.append(li);
        }
      }

      async function refreshPlugins() {
        const plugins = await invoke("list_plugins");
        renderPlugins(plugins);
      }

      document.getElementById("open-blank").addEventListener("click", () => {
        invoke("open_blank_window");
      });
      document.getElementById("close").addEventListener("click", () => {
        invoke("close_launcher");
      });
      document.getElementById("propose").addEventListener("click", async () => {
        const path = document.getElementById("install-path").value.trim();
        if (!path) {
          setStatus("Enter a folder or zip path.");
          return;
        }
        try {
          const proposal = await invoke("propose_install", { path });
          renderProposal(proposal);
          setStatus("Confirm permissions to install, or decline.");
        } catch (err) {
          renderProposal(null);
          setStatus(String(err));
        }
      });
      document.getElementById("confirm").addEventListener("click", async () => {
        if (!currentProposal) return;
        try {
          const listed = await invoke("confirm_install", {
            proposalId: currentProposal.proposalId,
          });
          renderProposal(null);
          setStatus(`Installed ${listed.name}.`);
          await refreshPlugins();
        } catch (err) {
          setStatus(String(err));
        }
      });
      document.getElementById("decline").addEventListener("click", async () => {
        if (!currentProposal) return;
        try {
          await invoke("decline_install", {
            proposalId: currentProposal.proposalId,
          });
          renderProposal(null);
          setStatus("Install declined — workbench unchanged.");
          await refreshPlugins();
        } catch (err) {
          setStatus(String(err));
        }
      });

      refreshPlugins();
    </script>
  </body>
</html>
