<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Spacecraft</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7f6;
        --ink: #143039;
        --accent: #0d5c63;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at top left, #d7ece9, var(--bg) 55%);
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      main {
        height: 100%;
        display: grid;
        place-items: center;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <main>Blank window</main>
  </body>
</html>
